name: Validate Schemas

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "test-vectors/**"
  pull_request:
    paths:
      - "schemas/**"
      - "test-vectors/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate test vectors against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Run schema validation
        run: python test-vectors/validate.py

      - name: Validate all schemas are valid JSON
        run: |
          for f in schemas/*.json; do
            python -m json.tool "$f" > /dev/null || { echo "FAIL: $f is not valid JSON"; exit 1; }
          done
          echo "All schemas are valid JSON"
