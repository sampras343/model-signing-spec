name: Validate Schemas

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "test-vectors/**"
  pull_request:
    paths:
      - "schemas/**"
      - "test-vectors/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate test vectors against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema referencing

      - name: Run schema validation
        run: python test-vectors/validate.py

      - name: Validate all schemas are valid JSON
        run: |
          for f in schemas/*.json; do
            python -m json.tool "$f" > /dev/null || { echo "FAIL: $f is not valid JSON"; exit 1; }
          done
          echo "All schemas are valid JSON"
